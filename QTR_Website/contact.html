<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - QTR</title>

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Basic styling -->
    <link rel="stylesheet" href="qtr_style.css" />
  </head>
  <body class="contact-page">
    <header>
      <a id="logo-btn" class="logo" href="index.html">
        <img src="images/QTR_logo.png" alt="QTR Logo" class="logo-image" />
      </a>
      <a href="about.html" class="nav-btn">About Us</a>
      <a href="contact.html" class="nav-btn">Contact Us</a>
      <button id="settings-btn" class="settings-btn">
        <i class="fas fa-cog"></i>
      </button>
    </header>

    <div class="section-heading">
      <h2 class="section-title">Contact Us</h2>
    </div>

    <div id="successBar" class="success-bar">Message sent successfully!</div>

    <div id="failBar" class="fail-bar">Message failed to send!</div>

    <main>
      <!-- Contact form or details will go here -->
      <form class="contact-form" id="contact-form">
        <label for="name">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Your name"
          required
        />

        <label for="email">Email</label>
        <input
          type="text"
          id="email"
          name="email"
          placeholder="Your email"
          required
        />

        <label for="subject">Subject</label>
        <input
          type="text"
          id="subject"
          name="subject"
          placeholder="Subject"
          required
        />

        <label for="message">Message</label>
        <textarea
          id="message"
          name="message"
          placeholder="Your message..."
          required
        ></textarea>

        <input type="hidden" id="time" name="time" />

        <button type="submit" class="send-btn">Send</button>
      </form>
    </main>

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <div id="settings-popup" class="settings-popup hidden">
      <div class="settings-content">
        <div class="settings-header">
          <h2>Settings</h2>
          <button id="close-settings" class="close-btn">×</button>
        </div>
        <div class="settings-body">
          <label class="setting-item">
            <span>Dark Mode</span>
            <label class="theme-switch">
              <input type="checkbox" id="theme-toggle" />
              <span class="slider"></span>
            </label>
          </label>
        </div>
      </div>
    </div>

    <footer>
      <div class="footer-content">
        <p>&copy; 2026 QTR</p>
        <div class="social-icons">
          <a
            href="https://facebook.com"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link facebook"
          >
            <i class="fab fa-facebook-f"></i>
          </a>
          <a
            href="https://instagram.com"
            target="_blank"
            rel="noopener noreferrer"
            class="social-link instagram"
          >
            <i class="fab fa-instagram"></i>
          </a>
        </div>
      </div>
    </footer>
    <script src="qtr_main.js"></script>
  </body>
</html>
